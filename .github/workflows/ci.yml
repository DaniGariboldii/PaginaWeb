name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  # ── Backend: tests unitarios + integración (con PostgreSQL real) ──────────────
  backend:
    name: Backend (tests)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ecommerce_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ecommerce_test?schema=public
      JWT_ACCESS_SECRET: ci_access_secret_para_pruebas_de_integracion_xx
      JWT_REFRESH_SECRET: ci_refresh_secret_para_pruebas_de_integracion_x
      NODE_ENV: test

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Generar Prisma Client
        run: npx prisma generate

      - name: Aplicar migraciones
        run: npx prisma migrate deploy

      - name: Tests unitarios
        run: npm test

      - name: Tests de integración
        run: npm run test:integration

  # ── Frontend: lint + build ────────────────────────────────────────────────────
  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
