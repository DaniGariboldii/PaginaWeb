server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compresión
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Proxy de la API al backend (mismo origen → cookies SameSite=strict funcionan)
    location /api/ {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Imágenes subidas localmente (cuando no se usa Cloudinary)
    location /uploads/ {
        proxy_pass http://backend:4000;
        proxy_set_header Host $host;
    }

    # Cache largo para assets con hash
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: cualquier ruta sirve index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
